name: Infra Terraform

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Terraform stack path"
        required: true
        default: "deploy/terraform/stacks/core-vm"
        type: choice
        options:
          - deploy/terraform/stacks/core-vm
          - deploy/terraform/stacks/bootstrap-oidc
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]
      plan_run_id:
        description: "Workflow run id that produced the Terraform plan artifact (required for apply)"
        required: false
        default: ""

env:
  TF_IN_AUTOMATION: "true"
  TF_PLAN_FILE: "tfplan"
  TF_PLAN_ARTIFACT_PREFIX: "infra-terraform-tfplan"

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ inputs.stack }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ inputs.stack }}
        run: terraform validate

      - name: Terraform plan
        if: inputs.action == 'plan'
        working-directory: ${{ inputs.stack }}
        run: terraform plan -out="${TF_PLAN_FILE}"

      - name: Upload Terraform plan artifact
        if: inputs.action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TF_PLAN_ARTIFACT_PREFIX }}-${{ inputs.stack == 'deploy/terraform/stacks/core-vm' && 'core-vm' || 'bootstrap-oidc' }}
          path: ${{ inputs.stack }}/${{ env.TF_PLAN_FILE }}
          if-no-files-found: error

      - name: Require plan run id for apply
        if: inputs.action == 'apply'
        run: |
          if [ -z "${{ inputs.plan_run_id }}" ]; then
            echo "::error::plan_run_id is required for apply. Run action=plan first, then pass that run id to apply."
            exit 1
          fi

      - name: Download Terraform plan artifact
        if: inputs.action == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.TF_PLAN_ARTIFACT_PREFIX }}-${{ inputs.stack == 'deploy/terraform/stacks/core-vm' && 'core-vm' || 'bootstrap-oidc' }}
          path: ${{ inputs.stack }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.plan_run_id }}
          github-token: ${{ github.token }}

      - name: Terraform apply
        if: inputs.action == 'apply'
        working-directory: ${{ inputs.stack }}
        run: terraform apply -auto-approve "${TF_PLAN_FILE}"

      - name: Terraform destroy
        if: inputs.action == 'destroy'
        working-directory: ${{ inputs.stack }}
        run: terraform destroy -auto-approve
