name: Core VM CI/CD

on:
  workflow_dispatch:
    inputs:
      vm_name:
        description: VM name
        required: true
        default: wg-core-gha
      region:
        description: GCP region for core VM
        required: true
        default: us-central1
      action:
        description: Terraform action
        required: true
        default: apply
        type: choice
        options: [plan, apply, destroy]
      rollout_artifact_ref:
        description: "Artifact reference for wg-core startup metadata (for example gs://bucket/path/core)"
        required: false
        default: ""
      rollout_env_ref:
        description: "Environment payload reference for wg-core startup metadata (Secret Manager or GCS)"
        required: false
        default: ""
      plan_run_id:
        description: "Workflow run id that produced the Terraform plan artifact (required for action=apply)"
        required: false
        default: ""

env:
  TF_IN_AUTOMATION: "true"
  DEFAULT_ALLOW_WG_CIDRS: "0.0.0.0/0"
  DEFAULT_ALLOW_CORE_GRPC_CIDRS: ""
  DEFAULT_TF_STATE_BUCKET_LOCATION: "us-central1"

jobs:
  core-vm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ZONE: ${{ format('{0}-a', inputs.region) }}
      TF_STACK_DIR: deploy/terraform/stacks/core-vm
      TF_PLAN_FILE: tfplan
      TF_PLAN_ARTIFACT: core-vm-tfplan
      ALLOW_WG_CIDRS: 0.0.0.0/0
      ALLOW_CORE_GRPC_CIDRS: ""
      TF_STATE_BUCKET_LOCATION: us-central1
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ inputs.region }}
      TF_VAR_zone: ${{ format('{0}-a', inputs.region) }}
      TF_VAR_name: ${{ inputs.vm_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow inputs and required secrets
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_TERRAFORM_SA: ${{ secrets.GCP_TERRAFORM_SA }}
          ROLLOUT_TLS_CERT_SECRET_REF: ${{ vars.CORE_ROLLOUT_TLS_CERT_SECRET_REF }}
          ROLLOUT_TLS_KEY_SECRET_REF: ${{ vars.CORE_ROLLOUT_TLS_KEY_SECRET_REF }}
        run: |
          set -euo pipefail

          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Missing required secret: GCP_PROJECT_ID"
            exit 1
          fi

          if [ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]; then
            echo "::error::Missing required secret: GCP_WORKLOAD_IDENTITY_PROVIDER"
            exit 1
          fi

          if [ -z "$GCP_TERRAFORM_SA" ]; then
            echo "::error::Missing required secret: GCP_TERRAFORM_SA"
            exit 1
          fi

          if [ "${{ inputs.action }}" = "plan" ] && [ -z "${{ inputs.rollout_artifact_ref }}" ]; then
            echo "::error::rollout_artifact_ref is required for action=plan."
            exit 1
          fi

          if [ "${{ inputs.action }}" = "plan" ] && [ -z "${{ inputs.rollout_env_ref }}" ]; then
            echo "::error::rollout_env_ref is required for action=plan."
            exit 1
          fi

          if { [ -n "$ROLLOUT_TLS_CERT_SECRET_REF" ] && [ -z "$ROLLOUT_TLS_KEY_SECRET_REF" ]; } || \
             { [ -z "$ROLLOUT_TLS_CERT_SECRET_REF" ] && [ -n "$ROLLOUT_TLS_KEY_SECRET_REF" ]; }; then
            echo "::error::rollout_tls_cert_secret_ref and rollout_tls_key_secret_ref must be provided together."
            exit 1
          fi

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - uses: hashicorp/setup-terraform@v3

      - uses: google-github-actions/setup-gcloud@v2

      - name: Export optional Terraform variables
        env:
          ALLOW_WG_CIDRS: ${{ env.ALLOW_WG_CIDRS }}
          ALLOW_CORE_GRPC_CIDRS: ${{ env.ALLOW_CORE_GRPC_CIDRS }}
          ROLLOUT_ARTIFACT_REF: ${{ inputs.rollout_artifact_ref }}
          ROLLOUT_ARTIFACT_SHA256: ${{ vars.CORE_ROLLOUT_ARTIFACT_SHA256 }}
          ROLLOUT_ENV_REF: ${{ inputs.rollout_env_ref }}
          ROLLOUT_UNIT_REF: ${{ vars.CORE_ROLLOUT_UNIT_REF }}
          ROLLOUT_PRIVATE_KEY_SECRET_REF: ${{ vars.CORE_ROLLOUT_PRIVATE_KEY_SECRET_REF }}
          ROLLOUT_TLS_CERT_SECRET_REF: ${{ vars.CORE_ROLLOUT_TLS_CERT_SECRET_REF }}
          ROLLOUT_TLS_KEY_SECRET_REF: ${{ vars.CORE_ROLLOUT_TLS_KEY_SECRET_REF }}
          ROLLOUT_TLS_CA_SECRET_REF: ${{ vars.CORE_ROLLOUT_TLS_CA_SECRET_REF }}
        run: |
          set -euo pipefail

          append_tf_var() {
            local name="$1"
            local value="$2"

            if [ -n "$value" ]; then
              printf 'TF_VAR_%s=%s\n' "$name" "$value" >>"$GITHUB_ENV"
            fi
          }

          append_tf_list_var() {
            local name="$1"
            local value="$2"
            local encoded

            if [ -z "$value" ]; then
              return 0
            fi

            encoded="$(python3 -c 'import json, sys; print(json.dumps([item.strip() for item in sys.argv[1].split(",") if item.strip()]))' "$value")"
            printf 'TF_VAR_%s=%s\n' "$name" "$encoded" >>"$GITHUB_ENV"
          }

          append_tf_list_var allow_wireguard_cidrs "$ALLOW_WG_CIDRS"
          append_tf_list_var allow_core_grpc_cidrs "$ALLOW_CORE_GRPC_CIDRS"
          append_tf_var rollout_artifact_ref "$ROLLOUT_ARTIFACT_REF"
          append_tf_var rollout_artifact_sha256 "$ROLLOUT_ARTIFACT_SHA256"
          append_tf_var rollout_env_ref "$ROLLOUT_ENV_REF"
          append_tf_var rollout_unit_ref "$ROLLOUT_UNIT_REF"
          append_tf_var rollout_private_key_secret_ref "$ROLLOUT_PRIVATE_KEY_SECRET_REF"
          append_tf_var rollout_tls_cert_secret_ref "$ROLLOUT_TLS_CERT_SECRET_REF"
          append_tf_var rollout_tls_key_secret_ref "$ROLLOUT_TLS_KEY_SECRET_REF"
          append_tf_var rollout_tls_ca_secret_ref "$ROLLOUT_TLS_CA_SECRET_REF"

      - name: Terraform init (shared GCS backend)
        run: |
          bash scripts/terraform-init-gcs-backend.sh \
            "$TF_STACK_DIR" \
            "$PROJECT_ID" \
            "" \
            "" \
            "${TF_STATE_BUCKET_LOCATION}"

      - name: Terraform validate (vm stack)
        working-directory: ${{ env.TF_STACK_DIR }}
        run: terraform validate

      - name: Terraform plan (vm stack)
        if: inputs.action == 'plan'
        working-directory: ${{ env.TF_STACK_DIR }}
        run: |
          set -o pipefail
          terraform plan -no-color -out="${TF_PLAN_FILE}" | tee terraform-plan.log

      - name: Upload Terraform plan artifact (vm stack)
        if: inputs.action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TF_PLAN_ARTIFACT }}
          path: ${{ env.TF_STACK_DIR }}/${{ env.TF_PLAN_FILE }}
          if-no-files-found: error

      - name: Summarize Terraform plan (vm stack)
        if: always() && inputs.action == 'plan'
        working-directory: ${{ env.TF_STACK_DIR }}
        run: |
          plan_summary="$(grep -E '^Plan: [0-9]+ to add, [0-9]+ to change, [0-9]+ to destroy\.$' terraform-plan.log | tail -n 1 || true)"
          no_changes_summary="$(grep -E '^No changes\.' terraform-plan.log | head -n 1 || true)"

          {
            echo "## Terraform plan (core VM stack)"
            echo ""
            echo "- plan_run_id: ${{ github.run_id }}"
            echo "- Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            if [ -n "$plan_summary" ]; then
              echo "- $plan_summary"
            elif [ -n "$no_changes_summary" ]; then
              echo "- $no_changes_summary"
            else
              echo "- Plan summary not found. Check the Terraform plan step logs."
            fi
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Require plan run id for Terraform apply
        if: inputs.action == 'apply'
        run: |
          if [ -z "${{ inputs.plan_run_id }}" ]; then
            echo "::error::plan_run_id is required for action=apply. Run action=plan first, then pass that run id to apply."
            exit 1
          fi

      - name: Download Terraform plan artifact (vm stack)
        if: inputs.action == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.TF_PLAN_ARTIFACT }}
          path: ${{ env.TF_STACK_DIR }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.plan_run_id }}
          github-token: ${{ github.token }}

      - name: Terraform apply (vm stack)
        if: inputs.action == 'apply'
        working-directory: ${{ env.TF_STACK_DIR }}
        run: |
          set -o pipefail
          terraform apply -no-color -auto-approve "${TF_PLAN_FILE}" | tee terraform-apply.log

      - name: Summarize Terraform apply (vm stack)
        if: always() && inputs.action == 'apply'
        working-directory: ${{ env.TF_STACK_DIR }}
        run: |
          apply_summary="$(grep -E '^Apply complete! Resources: [0-9]+ added, [0-9]+ changed, [0-9]+ destroyed\.$' terraform-apply.log | tail -n 1 || true)"
          no_changes_summary="$(grep -E '^No changes\.' terraform-apply.log | head -n 1 || true)"

          {
            echo "## Terraform apply (core VM stack)"
            echo ""
            echo "- plan_run_id: ${{ inputs.plan_run_id }}"
            echo "- Plan source: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ inputs.plan_run_id }}"
            if [ -n "$apply_summary" ]; then
              echo "- $apply_summary"
            elif [ -n "$no_changes_summary" ]; then
              echo "- $no_changes_summary"
            else
              echo "- Apply summary not found. Check the Terraform apply step logs."
            fi
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Terraform destroy (vm stack)
        if: inputs.action == 'destroy'
        working-directory: ${{ env.TF_STACK_DIR }}
        run: |
          set -o pipefail
          terraform destroy -no-color -auto-approve | tee terraform-destroy.log

      - name: Summarize Terraform destroy (vm stack)
        if: always() && inputs.action == 'destroy'
        working-directory: ${{ env.TF_STACK_DIR }}
        run: |
          destroy_summary="$(grep -E '^Destroy complete! Resources: [0-9]+ destroyed\.$' terraform-destroy.log | tail -n 1 || true)"
          no_changes_summary="$(grep -E '^No changes\.' terraform-destroy.log | head -n 1 || true)"

          {
            echo "## Terraform destroy (core VM stack)"
            echo ""
            if [ -n "$destroy_summary" ]; then
              echo "- $destroy_summary"
            elif [ -n "$no_changes_summary" ]; then
              echo "- $no_changes_summary"
            else
              echo "- Destroy summary not found. Check the Terraform destroy step logs."
            fi
          } >>"$GITHUB_STEP_SUMMARY"
