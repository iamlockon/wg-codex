name: Core VM CI/CD

on:
  workflow_dispatch:
    inputs:
      vm_name:
        description: VM name
        required: true
        default: wg-core-gha
      zone:
        description: GCP zone
        required: true
        default: us-central1-a
      region:
        description: Node region recorded in entry
        required: true
        default: us-central1
      action:
        description: Apply or destroy
        required: true
        default: apply
        type: choice
        options: [apply, destroy]

jobs:
  core-vm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_zone: ${{ inputs.zone }}
      TF_VAR_region: ${{ inputs.region }}
      TF_VAR_name: ${{ inputs.vm_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init (core-vm stack)
        working-directory: deploy/terraform/stacks/core-vm
        run: terraform init

      - name: Terraform apply/destroy (core-vm stack)
        working-directory: deploy/terraform/stacks/core-vm
        run: |
          if [[ "${{ inputs.action }}" == "destroy" ]]; then
            terraform destroy -auto-approve
          else
            terraform apply -auto-approve
          fi

      - name: Deploy core + entry onto VM
        if: inputs.action == 'apply'
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools jq
          scripts/deploy-core-vm.sh \
            --project "$PROJECT_ID" \
            --vm-name "${{ inputs.vm_name }}" \
            --zone "${{ inputs.zone }}" \
            --entry-admin-token "${{ secrets.ENTRY_ADMIN_API_TOKEN }}" \
            --google-oidc-client-id "${{ secrets.GOOGLE_OIDC_CLIENT_ID }}" \
            --google-oidc-client-secret "${{ secrets.GOOGLE_OIDC_CLIENT_SECRET }}" \
            --google-oidc-redirect-uri "${{ secrets.GOOGLE_OIDC_REDIRECT_URI }}" \
            --register-node-in-entry true \
            --entry-admin-url "${{ secrets.ENTRY_ADMIN_URL }}" \
            --entry-node-region "${{ inputs.region }}" \
            --entry-node-provider gcp-vm-gha
