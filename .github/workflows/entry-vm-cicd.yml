name: Entry VM CI/CD

on:
  workflow_dispatch:
    inputs:
      vm_name:
        description: VM name
        required: true
        default: wg-entry-gha
      zone:
        description: GCP zone (optional; defaults to <region>-a)
        required: false
        default: ""
      region:
        description: GCP region for entry VM
        required: true
        default: us-central1
      core_grpc_url:
        description: Primary core gRPC URL for entry admin/readiness checks
        required: false
        default: ""
      core_tls_domain:
        description: TLS domain name entry should validate for core
        required: false
        default: ""
      node_catalog_gcs_bucket:
        description: Optional GCS bucket containing the entry node catalog
        required: false
        default: ""
      node_catalog_gcs_object:
        description: Optional GCS object path containing the entry node catalog JSON
        required: false
        default: ""
      action:
        description: Plan, apply or destroy
        required: true
        default: apply
        type: choice
        options: [plan, apply, destroy]
      provisioner:
        description: Infrastructure provisioner
        required: true
        default: script
        type: choice
        options: [script, terraform]
      plan_run_id:
        description: "Workflow run id that produced the Terraform plan artifact (required for provisioner=terraform + action=apply)"
        required: false
        default: ""
      tf_state_bucket:
        description: "Optional GCS bucket name for Terraform state (auto-generated when empty)"
        required: false
        default: "wg-codex-tfstate-stg"
      tf_state_prefix:
        description: "Optional backend state object prefix (must end with /entry-vm; defaults to terraform/entry-vm)"
        required: false
        default: ""
      tf_state_bucket_location:
        description: "GCS location to use when creating the state bucket"
        required: false
        default: us-central1

jobs:
  entry-vm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ZONE: ${{ inputs.zone != '' && inputs.zone || format('{0}-a', inputs.region) }}
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_zone: ${{ inputs.zone != '' && inputs.zone || format('{0}-a', inputs.region) }}
      TF_VAR_region: ${{ inputs.region }}
      TF_VAR_name: ${{ inputs.vm_name }}
      TF_PLAN_FILE: "tfplan"
      TF_PLAN_ARTIFACT: "entry-vm-tfplan"
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow inputs and required secrets
        if: inputs.action == 'apply'
        run: |
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Missing required secret: GCP_PROJECT_ID"
            exit 1
          fi
          if [ -z "${{ inputs.core_grpc_url }}" ]; then
            echo "::error::core_grpc_url is required for apply."
            exit 1
          fi
          if [ -z "${{ inputs.core_tls_domain }}" ]; then
            echo "::error::core_tls_domain is required for apply."
            exit 1
          fi
          if [ -z "${{ secrets.ENTRY_DATABASE_URL }}" ]; then
            echo "::error::Missing required secret: ENTRY_DATABASE_URL"
            exit 1
          fi
          if [ -z "${{ secrets.ENTRY_JWT_SIGNING_KEYS }}" ]; then
            echo "::error::Missing required secret: ENTRY_JWT_SIGNING_KEYS"
            exit 1
          fi
          if [ -z "${{ secrets.ENTRY_ADMIN_API_TOKEN }}" ]; then
            echo "::error::Missing required secret: ENTRY_ADMIN_API_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.CORE_GRPC_TLS_CA_CERT_PEM }}" ]; then
            echo "::error::Missing required secret: CORE_GRPC_TLS_CA_CERT_PEM"
            exit 1
          fi
          if [ -z "${{ secrets.GOOGLE_OIDC_CLIENT_ID }}" ] || [ -z "${{ secrets.GOOGLE_OIDC_CLIENT_SECRET }}" ] || [ -z "${{ secrets.GOOGLE_OIDC_REDIRECT_URI }}" ]; then
            echo "::error::Missing one or more required GOOGLE_OIDC_* secrets."
            exit 1
          fi
          if { [ -n "${{ inputs.node_catalog_gcs_bucket }}" ] && [ -z "${{ inputs.node_catalog_gcs_object }}" ]; } || \
             { [ -z "${{ inputs.node_catalog_gcs_bucket }}" ] && [ -n "${{ inputs.node_catalog_gcs_object }}" ]; }; then
            echo "::error::node_catalog_gcs_bucket and node_catalog_gcs_object must be provided together."
            exit 1
          fi

      - name: Reject plan with script provisioner
        if: inputs.provisioner == 'script' && inputs.action == 'plan'
        run: |
          echo "::error::action=plan is only supported with provisioner=terraform."
          exit 1

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - uses: hashicorp/setup-terraform@v3
        if: inputs.provisioner == 'terraform'

      - uses: google-github-actions/setup-gcloud@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Terraform init (shared GCS backend)
        if: inputs.provisioner == 'terraform'
        run: |
          bash scripts/terraform-init-gcs-backend.sh \
            "deploy/terraform/stacks/entry-vm" \
            "$PROJECT_ID" \
            "${{ inputs.tf_state_bucket }}" \
            "${{ inputs.tf_state_prefix }}" \
            "${{ inputs.tf_state_bucket_location }}"

      - name: Terraform plan (vm stack)
        if: inputs.provisioner == 'terraform' && inputs.action == 'plan'
        working-directory: deploy/terraform/stacks/entry-vm
        run: |
          set -o pipefail
          terraform plan -no-color -out="${TF_PLAN_FILE}" | tee terraform-plan.log

      - name: Upload Terraform plan artifact (vm stack)
        if: inputs.provisioner == 'terraform' && inputs.action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TF_PLAN_ARTIFACT }}
          path: deploy/terraform/stacks/entry-vm/${{ env.TF_PLAN_FILE }}
          if-no-files-found: error

      - name: Summarize Terraform plan (vm stack)
        if: always() && inputs.provisioner == 'terraform' && inputs.action == 'plan'
        working-directory: deploy/terraform/stacks/entry-vm
        run: |
          plan_summary="$(grep -E '^Plan: [0-9]+ to add, [0-9]+ to change, [0-9]+ to destroy\.$' terraform-plan.log | tail -n 1 || true)"
          no_changes_summary="$(grep -E '^No changes\.' terraform-plan.log | head -n 1 || true)"

          {
            echo "## Terraform plan (vm stack)"
            echo ""
            echo "- plan_run_id: ${{ github.run_id }}"
            echo "- Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            if [ -n "$plan_summary" ]; then
              echo "- $plan_summary"
            elif [ -n "$no_changes_summary" ]; then
              echo "- $no_changes_summary"
            else
              echo "- Plan summary not found. Check the Terraform plan step logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Require plan run id for Terraform apply
        if: inputs.provisioner == 'terraform' && inputs.action == 'apply'
        run: |
          if [ -z "${{ inputs.plan_run_id }}" ]; then
            echo "::error::plan_run_id is required for provisioner=terraform + action=apply. Run action=plan first, then pass that run id to apply."
            exit 1
          fi

      - name: Download Terraform plan artifact (vm stack)
        if: inputs.provisioner == 'terraform' && inputs.action == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.TF_PLAN_ARTIFACT }}
          path: deploy/terraform/stacks/entry-vm
          repository: ${{ github.repository }}
          run-id: ${{ inputs.plan_run_id }}
          github-token: ${{ github.token }}

      - name: Terraform apply (vm stack)
        if: inputs.provisioner == 'terraform' && inputs.action == 'apply'
        working-directory: deploy/terraform/stacks/entry-vm
        run: |
          set -o pipefail
          terraform apply -no-color -auto-approve "${TF_PLAN_FILE}" | tee terraform-apply.log

      - name: Summarize Terraform apply (vm stack)
        if: always() && inputs.provisioner == 'terraform' && inputs.action == 'apply'
        working-directory: deploy/terraform/stacks/entry-vm
        run: |
          apply_summary="$(grep -E '^Apply complete! Resources: [0-9]+ added, [0-9]+ changed, [0-9]+ destroyed\.$' terraform-apply.log | tail -n 1 || true)"
          no_changes_summary="$(grep -E '^No changes\.' terraform-apply.log | head -n 1 || true)"

          {
            echo "## Terraform apply (vm stack)"
            echo ""
            if [ -n "$apply_summary" ]; then
              echo "- $apply_summary"
            elif [ -n "$no_changes_summary" ]; then
              echo "- $no_changes_summary"
            else
              echo "- Apply summary not found. Check the Terraform apply step logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform destroy (vm stack)
        if: inputs.provisioner == 'terraform' && inputs.action == 'destroy'
        working-directory: deploy/terraform/stacks/entry-vm
        run: |
          set -o pipefail
          terraform destroy -no-color -auto-approve | tee terraform-destroy.log

      - name: Summarize Terraform destroy (vm stack)
        if: always() && inputs.provisioner == 'terraform' && inputs.action == 'destroy'
        working-directory: deploy/terraform/stacks/entry-vm
        run: |
          destroy_summary="$(grep -E '^Destroy complete! Resources: [0-9]+ destroyed\.$' terraform-destroy.log | tail -n 1 || true)"
          no_changes_summary="$(grep -E '^No changes\.' terraform-destroy.log | head -n 1 || true)"

          {
            echo "## Terraform destroy (vm stack)"
            echo ""
            if [ -n "$destroy_summary" ]; then
              echo "- $destroy_summary"
            elif [ -n "$no_changes_summary" ]; then
              echo "- $no_changes_summary"
            else
              echo "- Destroy summary not found. Check the Terraform destroy step logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy entry onto VM
        if: inputs.action == 'apply'
        run: |
          core_ca_file="${RUNNER_TEMP}/core-ca.pem"
          printf '%s' '${{ secrets.CORE_GRPC_TLS_CA_CERT_PEM }}' > "$core_ca_file"

          cmd=(scripts/deploy-entry-vm.sh
            --project "$PROJECT_ID"
            --vm-name "${{ inputs.vm_name }}"
            --zone "$ZONE"
            --entry-app-env production
            --entry-database-url "${{ secrets.ENTRY_DATABASE_URL }}"
            --entry-admin-token "${{ secrets.ENTRY_ADMIN_API_TOKEN }}"
            --entry-jwt-signing-keys "${{ secrets.ENTRY_JWT_SIGNING_KEYS }}"
            --entry-allow-legacy-customer-header false
            --entry-require-core-tls true
            --entry-core-grpc-url "${{ inputs.core_grpc_url }}"
            --entry-core-tls-domain "${{ inputs.core_tls_domain }}"
            --google-oidc-client-id "${{ secrets.GOOGLE_OIDC_CLIENT_ID }}"
            --google-oidc-client-secret "${{ secrets.GOOGLE_OIDC_CLIENT_SECRET }}"
            --google-oidc-redirect-uri "${{ secrets.GOOGLE_OIDC_REDIRECT_URI }}"
            --tls-mode upload
            --tls-ca-file "$core_ca_file"
          )

          if [ -n "${{ inputs.node_catalog_gcs_bucket }}" ]; then
            cmd+=(--entry-node-catalog-gcs-bucket "${{ inputs.node_catalog_gcs_bucket }}")
            cmd+=(--entry-node-catalog-gcs-object "${{ inputs.node_catalog_gcs_object }}")
          fi

          "${cmd[@]}"

      - name: Destroy VM directly (script provisioner)
        if: inputs.action == 'destroy' && inputs.provisioner == 'script'
        run: |
          gcloud --project "$PROJECT_ID" compute instances delete "${{ inputs.vm_name }}" --zone "$ZONE" --quiet
