name: Entry VM CI/CD

on:
  workflow_dispatch:
    inputs:
      vm_name:
        description: VM name
        required: true
        default: wg-entry-gha
      zone:
        description: GCP zone (optional; defaults to <region>-a)
        required: false
        default: ""
      region:
        description: GCP region for entry VM
        required: true
        default: us-central1
      action:
        description: Plan, apply or destroy
        required: true
        default: apply
        type: choice
        options: [plan, apply, destroy]
      provisioner:
        description: Infrastructure provisioner
        required: true
        default: script
        type: choice
        options: [script, terraform]
      plan_run_id:
        description: "Workflow run id that produced the Terraform plan artifact (required for provisioner=terraform + action=apply)"
        required: false
        default: ""

jobs:
  entry-vm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      ZONE: ${{ inputs.zone != '' && inputs.zone || format('{0}-a', inputs.region) }}
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_zone: ${{ inputs.zone != '' && inputs.zone || format('{0}-a', inputs.region) }}
      TF_VAR_region: ${{ inputs.region }}
      TF_VAR_name: ${{ inputs.vm_name }}
      TF_PLAN_FILE: "tfplan"
      TF_PLAN_ARTIFACT: "entry-vm-core-vm-tfplan"
    steps:
      - uses: actions/checkout@v4

      - name: Reject plan with script provisioner
        if: inputs.provisioner == 'script' && inputs.action == 'plan'
        run: |
          echo "::error::action=plan is only supported with provisioner=terraform."
          exit 1

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - uses: hashicorp/setup-terraform@v3
        if: inputs.provisioner == 'terraform'

      - uses: google-github-actions/setup-gcloud@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Terraform init (vm stack)
        if: inputs.provisioner == 'terraform'
        working-directory: deploy/terraform/stacks/core-vm
        run: terraform init

      - name: Terraform plan (vm stack)
        if: inputs.provisioner == 'terraform' && inputs.action == 'plan'
        working-directory: deploy/terraform/stacks/core-vm
        run: terraform plan -out="${TF_PLAN_FILE}"

      - name: Upload Terraform plan artifact (vm stack)
        if: inputs.provisioner == 'terraform' && inputs.action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TF_PLAN_ARTIFACT }}
          path: deploy/terraform/stacks/core-vm/${{ env.TF_PLAN_FILE }}
          if-no-files-found: error

      - name: Require plan run id for Terraform apply
        if: inputs.provisioner == 'terraform' && inputs.action == 'apply'
        run: |
          if [ -z "${{ inputs.plan_run_id }}" ]; then
            echo "::error::plan_run_id is required for provisioner=terraform + action=apply. Run action=plan first, then pass that run id to apply."
            exit 1
          fi

      - name: Download Terraform plan artifact (vm stack)
        if: inputs.provisioner == 'terraform' && inputs.action == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.TF_PLAN_ARTIFACT }}
          path: deploy/terraform/stacks/core-vm
          repository: ${{ github.repository }}
          run-id: ${{ inputs.plan_run_id }}
          github-token: ${{ github.token }}

      - name: Terraform apply (vm stack)
        if: inputs.provisioner == 'terraform' && inputs.action == 'apply'
        working-directory: deploy/terraform/stacks/core-vm
        run: terraform apply -auto-approve "${TF_PLAN_FILE}"

      - name: Terraform destroy (vm stack)
        if: inputs.provisioner == 'terraform' && inputs.action == 'destroy'
        working-directory: deploy/terraform/stacks/core-vm
        run: terraform destroy -auto-approve

      - name: Deploy entry onto VM
        if: inputs.action == 'apply'
        run: |
          scripts/deploy-entry-vm.sh \
            --project "$PROJECT_ID" \
            --vm-name "${{ inputs.vm_name }}" \
            --zone "$ZONE" \
            --entry-admin-token "${{ secrets.ENTRY_ADMIN_API_TOKEN }}" \
            --google-oidc-client-id "${{ secrets.GOOGLE_OIDC_CLIENT_ID }}" \
            --google-oidc-client-secret "${{ secrets.GOOGLE_OIDC_CLIENT_SECRET }}" \
            --google-oidc-redirect-uri "${{ secrets.GOOGLE_OIDC_REDIRECT_URI }}"

      - name: Destroy VM directly (script provisioner)
        if: inputs.action == 'destroy' && inputs.provisioner == 'script'
        run: |
          gcloud --project "$PROJECT_ID" compute instances delete "${{ inputs.vm_name }}" --zone "$ZONE" --quiet
