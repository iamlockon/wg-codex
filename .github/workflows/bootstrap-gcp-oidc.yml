name: Bootstrap GCP OIDC

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "GCP project id"
        required: true
        default: "wg-stg"
      github_repository:
        description: "GitHub repository (owner/name). Leave empty for current repo."
        required: false
        default: ""
      workload_identity_pool_id:
        description: "Workload Identity Pool id"
        required: true
        default: github-actions
      workload_identity_provider_id:
        description: "Workload Identity Provider id"
        required: true
        default: github-oidc
      terraform_service_account_id:
        description: "Terraform service account id"
        required: true
        default: gha-terraform
      tf_state_bucket:
        description: "GCS bucket name for Terraform state"
        required: false
        default: "wg-codex-tfstate-stg"
      tf_state_prefix:
        description: "State object prefix in the bucket (must end with /bootstrap-oidc or be empty)"
        required: false
        default: ""
      tf_state_bucket_location:
        description: "GCS location to use when creating the state bucket"
        required: false
        default: us-central1
      plan_run_id:
        description: "Workflow run id that produced the Terraform plan artifact (required for apply)"
        required: false
        default: ""
      action:
        description: "Terraform action"
        required: true
        default: plan
        type: choice
        options: [plan, apply, destroy]

env:
  TF_IN_AUTOMATION: "true"
  TF_PLAN_FILE: "tfplan"
  TF_PLAN_ARTIFACT: "bootstrap-oidc-tfplan"

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      TF_VAR_project_id: ${{ inputs.project_id }}
      TF_VAR_github_repository: ${{ inputs.github_repository != '' && inputs.github_repository || github.repository }}
      TF_VAR_workload_identity_pool_id: ${{ inputs.workload_identity_pool_id }}
      TF_VAR_workload_identity_provider_id: ${{ inputs.workload_identity_provider_id }}
      TF_VAR_terraform_service_account_id: ${{ inputs.terraform_service_account_id }}
      TF_VAR_github_token: ${{ secrets.GH_ADMIN_TOKEN != '' && secrets.GH_ADMIN_TOKEN || github.token }}
      GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_BOOTSTRAP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3

      - name: Validate GitHub token for Actions secrets
        if: inputs.action != 'plan'
        env:
          REPO: ${{ inputs.github_repository != '' && inputs.github_repository || github.repository }}
        run: |
          if [ -z "$GH_ADMIN_TOKEN" ]; then
            echo "::error::GH_ADMIN_TOKEN is required for apply/destroy. GITHUB_TOKEN cannot manage repository Actions secrets."
            exit 1
          fi

          curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_ADMIN_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/secrets/public-key" > /dev/null

      - name: Terraform init (shared GCS backend)
        run: |
          bash scripts/terraform-init-gcs-backend.sh \
            "deploy/terraform/stacks/bootstrap-oidc" \
            "${{ inputs.project_id }}" \
            "${{ inputs.tf_state_bucket }}" \
            "${{ inputs.tf_state_prefix }}" \
            "${{ inputs.tf_state_bucket_location }}"

      - name: Import existing resources (plan only)
        if: inputs.action == 'plan'
        working-directory: deploy/terraform/stacks/bootstrap-oidc
        env:
          PROJECT_ID: ${{ inputs.project_id }}
          WORKLOAD_IDENTITY_POOL_ID: ${{ inputs.workload_identity_pool_id }}
          WORKLOAD_IDENTITY_PROVIDER_ID: ${{ inputs.workload_identity_provider_id }}
          TERRAFORM_SERVICE_ACCOUNT_ID: ${{ inputs.terraform_service_account_id }}
          GITHUB_REPOSITORY_FULL: ${{ inputs.github_repository != '' && inputs.github_repository || github.repository }}
        run: |
          set +e

          try_import() {
            local address="$1"
            local import_id="$2"
            if terraform import -no-color "$address" "$import_id"; then
              echo "Imported: $address"
            else
              echo "Skipped import: $address"
            fi
          }

          PROJECT_NUMBER="$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)' 2>/dev/null)"
          SA_EMAIL="${TERRAFORM_SERVICE_ACCOUNT_ID}@${PROJECT_ID}.iam.gserviceaccount.com"

          if [ -n "$PROJECT_NUMBER" ]; then
            try_import \
              google_iam_workload_identity_pool.github \
              "projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/${WORKLOAD_IDENTITY_POOL_ID}"
            try_import \
              google_iam_workload_identity_pool_provider.github \
              "projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/${WORKLOAD_IDENTITY_POOL_ID}/providers/${WORKLOAD_IDENTITY_PROVIDER_ID}"

            GITHUB_REPO_MEMBER="principalSet://iam.googleapis.com/projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/${WORKLOAD_IDENTITY_POOL_ID}/attribute.repository/${GITHUB_REPOSITORY_FULL}"
            try_import \
              google_service_account_iam_member.github_oidc_impersonation \
              "projects/${PROJECT_ID}/serviceAccounts/${SA_EMAIL} roles/iam.workloadIdentityUser ${GITHUB_REPO_MEMBER}"
          else
            # Fallback IDs for pool/provider if project number lookup is unavailable.
            try_import \
              google_iam_workload_identity_pool.github \
              "${PROJECT_ID}/${WORKLOAD_IDENTITY_POOL_ID}"
            try_import \
              google_iam_workload_identity_pool_provider.github \
              "${PROJECT_ID}/${WORKLOAD_IDENTITY_POOL_ID}/${WORKLOAD_IDENTITY_PROVIDER_ID}"
            echo "Skipped import: google_service_account_iam_member.github_oidc_impersonation (project number unavailable)"
          fi

          try_import "google_project_service.iamcredentials[0]" "${PROJECT_ID}/iamcredentials.googleapis.com"
          try_import "google_project_service.sts[0]" "${PROJECT_ID}/sts.googleapis.com"

          for role in \
            roles/compute.admin \
            roles/container.admin \
            roles/cloudsql.admin \
            roles/secretmanager.admin \
            roles/serviceusage.serviceUsageAdmin \
            roles/iam.serviceAccountAdmin \
            roles/iam.serviceAccountUser \
            roles/resourcemanager.projectIamAdmin
          do
            try_import \
              "google_project_iam_member.terraform_sa_roles[\"${role}\"]" \
              "${PROJECT_ID} ${role} serviceAccount:${SA_EMAIL}"
          done

          exit 0

      - name: Terraform validate
        working-directory: deploy/terraform/stacks/bootstrap-oidc
        run: terraform validate

      - name: Terraform plan
        if: inputs.action == 'plan'
        working-directory: deploy/terraform/stacks/bootstrap-oidc
        run: |
          set -o pipefail
          terraform plan -no-color -out="${TF_PLAN_FILE}" | tee terraform-plan.log

      - name: Upload Terraform plan artifact
        if: inputs.action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TF_PLAN_ARTIFACT }}
          path: deploy/terraform/stacks/bootstrap-oidc/${{ env.TF_PLAN_FILE }}
          if-no-files-found: error

      - name: Summarize Terraform plan
        if: always() && inputs.action == 'plan'
        working-directory: deploy/terraform/stacks/bootstrap-oidc
        run: |
          plan_summary="$(grep -E '^Plan: [0-9]+ to add, [0-9]+ to change, [0-9]+ to destroy\.$' terraform-plan.log | tail -n 1 || true)"
          no_changes_summary="$(grep -E '^No changes\.' terraform-plan.log | head -n 1 || true)"

          {
            echo "## Terraform plan"
            echo ""
            echo "- plan_run_id: ${{ github.run_id }}"
            echo "- Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            if [ -n "$plan_summary" ]; then
              echo "- $plan_summary"
            elif [ -n "$no_changes_summary" ]; then
              echo "- $no_changes_summary"
            else
              echo "- Plan summary not found. Check the Terraform plan step logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Require plan run id for apply
        if: inputs.action == 'apply'
        run: |
          if [ -z "${{ inputs.plan_run_id }}" ]; then
            echo "::error::plan_run_id is required for apply. Run action=plan first, then pass that run id to apply."
            exit 1
          fi

      - name: Download Terraform plan artifact
        if: inputs.action == 'apply'
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.TF_PLAN_ARTIFACT }}
          path: deploy/terraform/stacks/bootstrap-oidc
          repository: ${{ github.repository }}
          run-id: ${{ inputs.plan_run_id }}
          github-token: ${{ github.token }}

      - name: Terraform apply
        if: inputs.action == 'apply'
        working-directory: deploy/terraform/stacks/bootstrap-oidc
        run: |
          set -o pipefail
          terraform apply -no-color -auto-approve "${TF_PLAN_FILE}" | tee terraform-apply.log

      - name: Summarize Terraform apply
        if: always() && inputs.action == 'apply'
        working-directory: deploy/terraform/stacks/bootstrap-oidc
        run: |
          apply_summary="$(grep -E '^Apply complete! Resources: [0-9]+ added, [0-9]+ changed, [0-9]+ destroyed\.$' terraform-apply.log | tail -n 1 || true)"
          no_changes_summary="$(grep -E '^No changes\.' terraform-apply.log | head -n 1 || true)"

          {
            echo "## Terraform apply"
            echo ""
            if [ -n "$apply_summary" ]; then
              echo "- $apply_summary"
            elif [ -n "$no_changes_summary" ]; then
              echo "- $no_changes_summary"
            else
              echo "- Apply summary not found. Check the Terraform apply step logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Terraform destroy
        if: inputs.action == 'destroy'
        working-directory: deploy/terraform/stacks/bootstrap-oidc
        run: |
          set -o pipefail
          terraform destroy -no-color -auto-approve | tee terraform-destroy.log

      - name: Summarize Terraform destroy
        if: always() && inputs.action == 'destroy'
        working-directory: deploy/terraform/stacks/bootstrap-oidc
        run: |
          destroy_summary="$(grep -E '^Destroy complete! Resources: [0-9]+ destroyed\.$' terraform-destroy.log | tail -n 1 || true)"
          no_changes_summary="$(grep -E '^No changes\.' terraform-destroy.log | head -n 1 || true)"

          {
            echo "## Terraform destroy"
            echo ""
            if [ -n "$destroy_summary" ]; then
              echo "- $destroy_summary"
            elif [ -n "$no_changes_summary" ]; then
              echo "- $no_changes_summary"
            else
              echo "- Destroy summary not found. Check the Terraform destroy step logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
