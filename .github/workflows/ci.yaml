name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "clients/**"
      - "crates/**"
      - "services/**"

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build check
        run: cargo check --workspace --exclude wg-windows-client

      - name: Install native-nft build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmnl-dev libnftnl-dev

      - name: Build check (core native-nft feature)
        run: cargo check -p core --features native-nft

      - name: Unit tests
        run: cargo test --workspace --lib --exclude wg-windows-client
