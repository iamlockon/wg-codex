name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "clients/**"
      - "crates/**"
      - "db/**"
      - ".github/workflows/**"
      - "scripts/**"
      - "services/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend_e2e: ${{ steps.filter.outputs.backend_e2e }}
      windows_desktop: ${{ steps.filter.outputs.windows_desktop }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend_e2e:
              - 'services/entry/**'
              - 'services/core/**'
              - 'crates/control-plane/**'
              - 'crates/domain/**'
              - 'crates/backend-e2e/**'
              - 'db/**'
              - 'scripts/run-backend-e2e.sh'
              - '.github/workflows/ci.yaml'
            windows_desktop:
              - 'clients/windows-desktop/**'

  rust:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build check
        run: cargo check --workspace --exclude wg-windows-client

      - name: Install native-nft build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmnl-dev libnftnl-dev

      - name: Build check (core native-nft feature)
        run: cargo check -p core --features native-nft

      - name: Unit tests
        run: cargo test --workspace --lib --exclude wg-windows-client

  e2e-backend:
    needs: changes
    if: needs.changes.outputs.backend_e2e == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: wg_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wg_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/wg_test
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Run backend e2e suite
        run: bash scripts/run-backend-e2e.sh

  windows-desktop:
    needs: changes
    if: needs.changes.outputs.windows_desktop == 'true'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: clients/windows-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            clients/windows-desktop/package-lock.json
            clients/windows-desktop/ui/package-lock.json

      - name: Install desktop dependencies
        run: npm install

      - name: Install UI dependencies
        run: npm --prefix ui install

      - name: UI typecheck
        run: npm --prefix ui run typecheck

      - name: UI build
        run: npm --prefix ui run build

      - name: Desktop host build check
        run: cargo check -p wg-windows-client

      - name: Desktop test compile
        run: cargo test -p wg-windows-client --no-run
